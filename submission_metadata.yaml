# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude (Anthropic) to design and implement the ranking engine,
  including the JD-knowledge extraction, feature engineering, scoring
  weights, honeypot detection heuristics, the dashboard, and the test
  suite. All design decisions (which signals to use, how to weight them,
  how to detect honeypots) were derived by directly profiling the actual
  100,000-candidate dataset — see README.md "How the dataset's traps were
  identified" for the empirical basis of each heuristic. No candidate data
  was sent to any external LLM API; all analysis ran locally against the
  provided file.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Four-stage CPU-only pipeline, ~130s / ~210MB RSS on the full 100K pool.
  Stage 1: capped, saturating regex matching against a JD-derived concept
  vocabulary (embeddings/retrieval, vector/hybrid search, eval frameworks,
  ranking-system mandate language) — BM25-style term saturation without an
  embeddings model. Stage 2: structured re-ranking — title seniority, a
  skill-credibility score that discounts claims unsupported by duration/
  endorsements/assessment scores (the main keyword-stuffing defense),
  career-industry quality from the schema's own industry field, experience-
  band fit, location/notice-period logistics, education tier, and six
  explicit JD disqualifiers (services-only career, CV/speech-only,
  LLM-wrapper-only, academic-only, stale-architect, title-chaser) plus a
  no-visa-path check, each a multiplicative penalty. Stage 3: a behavioral
  availability multiplier from recency, response rate, and engagement
  signals. Stage 4: a hard honeypot exclude using three internally-
  consistent signals empirically verified (clean bimodal separation, no
  observed false positives) against the actual dataset, catching 60 of the
  documented ~80 honeypots. Reasoning strings are template-assembled from
  the same extracted facts the score is built from — nothing is invented.

